<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="favicon.ico">
    <title>ჯალათი</title>
</head>
<body>
    <div class="main">
        <header class="gameHeader">
            <h1>ჯალათი</h1>
            <div class="headerRow" role="group" aria-label="თამაშის მდგომარეობა">
               
                <div class="headerStat" id="roundProgressLine">დონე <span id="roundProgress">1/1</span></div>
            </div>
        </header>
        <p class="tagline">იპოვეთ დამალული სიტყვა </p>

        <p class="roundInline" id="roundInline" role="status" aria-live="polite" hidden></p>
        <div class="retryRow" id="retryRow" hidden>
            <button type="button" class="retryBtn" id="btnRetry">კიდევ ერთხელ (იგივე დონე)</button>
        </div>

        <div class="gibbet">
            <svg>
                <line x1="50" y1="20" x2="150" y2="20" />
                <line x1="150" y1="20" x2="150" y2="70" />
                <line x1="50" y1="250" x2="50" y2="20" />
                <line x1="20" y1="250" x2="80" y2="250" />
                <circle class="figure" cx="150" cy="90" r="20"/>
                <line class="figure" x1="150" y1="110" x2="150" y2="170" />
                <line class="figure" x1="150" y1="150" x2="130" y2="130"/>
                <line class="figure" x1="150" y1="150" x2="170" y2="130"/>
                <line class="figure" x1="150" y1="160" x2="140" y2="200"/>
                <line class="figure" x1="150" y1="160" x2="160" y2="200"/>
            </svg>

            <div class="wrong-letter">
                <div id="wrong-letter"></div>
            </div>

            <div id="word" class="word"></div>
            <div class="clue" id="clue">
                <span>მინიშნება : </span>
                <span id="clueText" class="clueText"></span>
            </div>

            <div class="wordNav wordNavBelow" id="wordNav" role="group" aria-label="დონეების ნავიგაცია">
                <button type="button" class="wordNavBtn" id="wordNavPrev" disabled>წინა</button>
                <button type="button" class="wordNavBtn" id="wordNavNext" disabled>შემდეგი</button>
            </div>
        </div>
        <div id="won">
            <div class="won wonInner">
                <h2 id="message"></h2>
                <p class="roundScore" id="roundScore"></p>
                <div class="overlayActions" id="overlayActions">
                    <button type="button" class="playBtn" id="play">ახალი თამაში</button>
                </div>
            </div>
        </div>
        <div class="not" id="not">
            <p>თქვენ უკვე გამოიყენეთ ეს ასობგერა</p>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
